<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frankie sarti // portfolio</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --hot-pink: #F0097D;
      --black: #0a0a0a;
      --white: #fafafa;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--hot-pink);
      font-family: 'Arial Narrow', Arial, sans-serif;
      font-stretch: condensed;
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────────
       HERO SECTION (first viewport)
    ───────────────────────────────────────── */
    #hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 4vw;
      gap: 2vw;
    }

    /* ── header row ── */
    .header-row {
      display: flex;
      align-items: stretch;
      gap: 0.6em;
      animation: slideInLeft 0.6s cubic-bezier(0.22,1,0.36,1) both;
      flex-wrap: wrap;
    }

    .title-box {
      background: var(--white);
      border: 3px solid var(--black);
      padding: 0.45em 0.9em;
      transition: background 0.15s;
    }
    .title-box { cursor: pointer; }
    .title-box:hover { background: #eee; }

    .title-box h1 {
      font-weight: 900;
      font-size: clamp(1.5rem, 3.5vw, 3rem);
      color: var(--black);
      white-space: nowrap;
    }

    .volume-btn {
      background: var(--white);
      border: 3px solid var(--black);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1/1;
      width: calc(clamp(1.5rem, 3.5vw, 3rem) + 0.9em * 2);
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .volume-btn:hover { background: #eee; }
    .volume-btn svg { width: 45%; height: 45%; display: block; }

    /* ── sidebar links ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.2em;
      animation: slideInLeft 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    .sidebar-label {
      font-weight: 900;
      font-size: clamp(1.2rem, 2.8vw, 2.2rem);
      color: var(--white);
      line-height: 1.2;
    }

    .sidebar-label.small {
      font-weight: 700;
      font-size: clamp(0.7rem, 1.2vw, 1rem);
      opacity: 0.85;
      margin-top: -0.3em;
      margin-bottom: 0.3em;
    }

    .sidebar-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      font-weight: 900;
      font-size: clamp(1.2rem, 2.8vw, 2.2rem);
      color: var(--white);
      text-decoration: none;
      line-height: 1.2;
      transition: opacity 0.15s;
    }
    .sidebar-link:hover { opacity: 0.7; }

    .arrow {
      font-style: normal;
      font-size: 0.85em;
    }

    /* ── hero body: sidebar + big image ── */
    .hero-body {
      display: flex;
      gap: 3vw;
      flex: 1;
      align-items: flex-start;
      justify-content: space-between;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      gap: 0.15em;
      min-width: 220px;
    }

    /* ── big featured image — letter size portrait ── */
    .big-image-box {
      background: var(--white);
      border: 3px solid var(--black);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: slideInRight 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
      width: min(38vw, 400px);
      aspect-ratio: 8.5 / 11;
      flex-shrink: 0;
    }

    .big-image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .big-image-box .placeholder-text {
      color: #ccc;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      padding: 2rem;
    }

    /* ─────────────────────────────────────────
       GALLERY SECTION (sticky full-screen)
    ───────────────────────────────────────── */
    #gallery {
      width: 100%;
    }

    /* Each poster takes the full viewport */
    .poster-slide {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3vw;
      background: var(--hot-pink);
    }

    .poster-slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border: 3px solid var(--black);
      display: block;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .poster-slide img.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─────────────────────────────────────────
       ANIMATIONS
    ───────────────────────────────────────── */
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ─────────────────────────────────────────
       MOBILE
    ───────────────────────────────────────── */
    @media (max-width: 700px) {
      .hero-body { flex-direction: column; }
      .big-image-box { min-height: 50vw; max-height: 70vw; width: 100%; }
      .title-box h1 { white-space: normal; }
    }
  </style>
</head>
<body>

  <!-- ── AUDIO ── -->
  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <!-- ══════════════════════════════════
       HERO
  ══════════════════════════════════ -->
  <section id="hero">

    <div class="header-row">
      <a href="index.html" style="text-decoration:none;">
        <div class="title-box">
          <h1>frankiesarti.com/portfolio</h1>
        </div>
      </a>
      <button class="volume-btn" id="volumeBtn" onclick="toggleMusic()" title="mute / unmute">
        <svg id="volIcon" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path id="wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path id="wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <line id="mutedX1" x1="23" y1="9" x2="17" y2="15" style="display:none"/>
          <line id="mutedX2" x1="17" y1="9" x2="23" y2="15" style="display:none"/>
        </svg>
      </button>
    </div>

    <div class="hero-body">
      <div class="hero-left">
        <span class="sidebar-label">music</span>

        <a class="sidebar-link" href="https://www.youtube.com/watch?v=EblI5F_6snA" target="_blank" rel="noopener">
          podcast <span class="arrow">↗</span>
        </a>
        <span class="sidebar-label small">*podcast dialogue courtesy of a24*</span>

        <a class="sidebar-link" href="https://www.youtube.com/watch?v=S4UeCXxvb7A" target="_blank" rel="noopener">
          extra terrestrial <span class="arrow">↗</span>
        </a>
      </div>

      <!-- Big featured image — name it IMG_1.png (or .jpg/.jpeg/.webp) in your repo -->
      <div class="big-image-box" id="bigImageBox">
        <p class="placeholder-text">upload IMG_1.png to your repo</p>
      </div>
    </div>

  </section>

  <!-- ══════════════════════════════════
       GALLERY — full-screen poster slides
       ▸ ADD images here: copy a <div class="poster-slide"> block
         and change the src to your filename.
  ══════════════════════════════════ -->
  <section id="gallery">
    <!-- ↓↓↓ ADD / REMOVE poster slides here ↓↓↓ -->
    <div class="poster-slide"><img src="IMG_2.png"  alt="poster" loading="lazy" /></div>
    <div class="poster-slide"><img src="IMG_3.png"  alt="poster" loading="lazy" /></div>
    <div class="poster-slide"><img src="IMG_4.png"  alt="poster" loading="lazy" /></div>
    <!-- ↑↑↑ copy the line above and change the number to add more ↑↑↑ -->
  </section>

  <script>
    /* ── Music ── */
    const audio   = document.getElementById('bgMusic');
    const wave1   = document.getElementById('wave1');
    const wave2   = document.getElementById('wave2');
    const mutedX1 = document.getElementById('mutedX1');
    const mutedX2 = document.getElementById('mutedX2');
    let playing = false;

    function setMutedIcon(muted) {
      wave1.style.display  = muted ? 'none' : '';
      wave2.style.display  = muted ? 'none' : '';
      mutedX1.style.display = muted ? ''    : 'none';
      mutedX2.style.display = muted ? ''    : 'none';
    }

    function toggleMusic() {
      if (playing) {
        audio.pause();
        setMutedIcon(true);
      } else {
        audio.play().catch(() => {});
        setMutedIcon(false);
      }
      playing = !playing;
    }

    setMutedIcon(true);

    document.addEventListener('click', function tryAutoplay() {
      if (!playing) {
        audio.play().then(() => {
          playing = true;
          setMutedIcon(false);
        }).catch(() => {});
      }
      document.removeEventListener('click', tryAutoplay);
    }, { once: true });

    /* ── Big image: try common extensions ── */
    const extensions = ['png','jpg','jpeg','webp','PNG','JPG','JPEG'];
    const box = document.getElementById('bigImageBox');

    function tryLoad(exts, i) {
      if (i >= exts.length) return; // none found, placeholder stays
      const img = new Image();
      img.src = 'IMG_1.' + exts[i];
      img.onload = () => {
        img.alt = 'featured poster';
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        img.style.display = 'block';
        box.innerHTML = '';
        box.appendChild(img);
      };
      img.onerror = () => tryLoad(exts, i + 1);
    }
    tryLoad(extensions, 0);

    /* ── Scroll reveal for gallery posters ── */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.poster-slide img').forEach(img => observer.observe(img));
  </script>

</body>
</html>
